# /etc/nginx/sites-available/shusain.xyz
# symlink: ln -s /etc/nginx/sites-available/shusain.xyz /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name shusain.xyz www.shusain.xyz;
    return 301 https://shusain.xyz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shusain.xyz www.shusain.xyz;

    # SSL — issued by: certbot --nginx -d shusain.xyz -d www.shusain.xyz
    ssl_certificate     /etc/letsencrypt/live/shusain.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shusain.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # www → bare domain
    if ($host = 'www.shusain.xyz') {
        return 301 https://shusain.xyz$request_uri;
    }

    root  /var/www/portfolio;
    index portfolio.html;

    location / {
        try_files $uri $uri/ /portfolio.html;
    }

    # Security headers
    add_header X-Frame-Options           "DENY"                                     always;
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Cache static assets aggressively
    location ~* \.(css|js|svg|ico|png|jpg|webp|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_types text/html text/css application/javascript image/svg+xml application/xml;
    gzip_min_length 1024;
}
